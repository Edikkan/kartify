apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kartify-frontend-ingress
  namespace: kartify
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - kartify.yourdomain.com
    - www.kartify.yourdomain.com
    secretName: kartify-frontend-tls
  rules:
  - host: kartify.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kartify-frontend
            port:
              number: 3000
  - host: www.kartify.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kartify-frontend
            port:
              number: 3000

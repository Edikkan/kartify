apiVersion: v1
kind: ConfigMap
metadata:
  name: kartify-config
  namespace: kartify
data:
  NODE_ENV: "production"
  PORT: "5000"
  FRONTEND_URL: "https://kartify.yourdomain.com"
  API_URL: "https://api.kartify.yourdomain.com"
  REDIS_URL: "redis://kartify-redis:6379"
  JWT_EXPIRE: "7d"
  LOG_LEVEL: "info"
  ENABLE_METRICS: "true"

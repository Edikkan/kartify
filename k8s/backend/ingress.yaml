apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kartify-backend-ingress
  namespace: kartify
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - api.kartify.yourdomain.com
    secretName: kartify-api-tls
  rules:
  - host: api.kartify.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kartify-backend
            port:
              number: 5000

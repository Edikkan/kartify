apiVersion: apps/v1
kind: Deployment
metadata:
  name: kartify-postgres
  namespace: kartify
  labels:
    app: kartify-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kartify-postgres
  template:
    metadata:
      labels:
        app: kartify-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: "kartify"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: kartify-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kartify-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - kartify
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - kartify
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: kartify-postgres-pvc
